services:
  - type: web
    name: bingo-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        fromGroup: port
    healthCheckPath: /health
    autoDeploy: true

groups:
  - name: port
    envVars:
      - key: PORT
        value: 3001
